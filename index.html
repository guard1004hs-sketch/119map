<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>AR 안전체험 가이드</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&family=DM+Mono:wght@500&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --yellow:#FFD600; --bg-dark:#060C10;
      --glass:rgba(6,12,16,0.80); --text:#FFFFFF;
      --text-dim:rgba(255,255,255,0.55); --border:rgba(255,214,0,0.30); --green:#00E676;
    }
    html,body { width:100%; height:100%; overflow:hidden; background:#000; }

    /* 권한 화면 */
    #permission-screen {
      position:fixed; inset:0; z-index:9999; background:var(--bg-dark);
      display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px;
      font-family:'Noto Sans KR',sans-serif;
    }
    .logo-icon { font-size:52px; margin-bottom:20px; animation:float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .perm-title { font-size:24px; font-weight:900; color:var(--text); text-align:center; line-height:1.25; margin-bottom:8px; }
    .perm-title em { color:var(--yellow); font-style:normal; }
    .perm-sub { font-family:'DM Mono',monospace; font-size:12px; color:var(--text-dim); text-align:center; line-height:1.7; margin-bottom:32px; }
    .perm-items { display:flex; flex-direction:column; gap:8px; width:100%; max-width:300px; margin-bottom:32px; }
    .perm-item { display:flex; align-items:center; gap:12px; background:rgba(255,214,0,0.06); border:1px solid var(--border); border-radius:12px; padding:12px 16px; }
    .perm-icon { font-size:20px; flex-shrink:0; }
    .perm-label { font-size:14px; font-weight:700; color:var(--text); }
    .perm-label small { display:block; font-size:11px; color:var(--text-dim); font-weight:400; margin-top:1px; }
    #start-btn {
      width:100%; max-width:300px; padding:16px;
      background:var(--yellow); color:#060C10; border:none; border-radius:14px; cursor:pointer;
      font-family:'Noto Sans KR',sans-serif; font-size:16px; font-weight:900;
      box-shadow:0 0 20px rgba(255,214,0,0.4); transition:all .2s;
    }
    #start-btn:active { transform:scale(0.97); }
    #start-btn:disabled { opacity:0.6; cursor:default; }
    #error-msg { margin-top:14px; font-family:'DM Mono',monospace; font-size:12px; color:#FF5252; text-align:center; display:none; line-height:1.7; white-space:pre-line; }

    /* AR 화면 */
    #ar-screen { position:fixed; inset:0; display:none; }
    #video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    #canvas { position:absolute; inset:0; width:100%; height:100%; }

    .corner { position:absolute; width:22px; height:22px; z-index:10; }
    .corner::before,.corner::after { content:''; position:absolute; background:var(--yellow); }
    .corner::before { width:100%; height:2px; top:0; left:0; }
    .corner::after  { width:2px; height:100%; top:0; left:0; }
    .corner.tl { top:14px; left:14px; }
    .corner.tr { top:14px; right:14px; transform:rotate(90deg); }
    .corner.bl { bottom:14px; left:14px; transform:rotate(270deg); }
    .corner.br { bottom:14px; right:14px; transform:rotate(180deg); }

    #status-bar {
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      background:var(--glass); border:1px solid var(--border); border-radius:100px; padding:7px 16px;
      display:flex; align-items:center; gap:8px; backdrop-filter:blur(12px);
      font-family:'DM Mono',monospace; font-size:11px; color:var(--text); white-space:nowrap; z-index:10;
    }
    #status-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    #info-panel {
      position:absolute; bottom:0; left:0; right:0; z-index:10;
      background:linear-gradient(transparent, var(--glass) 35%);
      padding:40px 18px 24px;
    }
    #count-label { font-family:'Noto Sans KR',sans-serif; font-weight:900; font-size:11px; color:var(--yellow); letter-spacing:1px; margin-bottom:4px; }
    #gps-coords  { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); margin-bottom:8px; }
    #nearby-list { display:flex; flex-direction:column; gap:5px; max-height:150px; overflow-y:auto; }
    #nearby-list::-webkit-scrollbar { display:none; }
    .nearby-item { display:flex; justify-content:space-between; align-items:center; background:rgba(6,12,16,0.75); border:1px solid var(--border); border-radius:8px; padding:9px 13px; backdrop-filter:blur(8px); }
    .nearby-name { font-family:'Noto Sans KR',sans-serif; font-weight:700; font-size:13px; color:var(--text); display:flex; align-items:center; gap:7px; }
    .nearby-name::before { content:'▼'; color:var(--yellow); font-size:9px; }
    .nearby-dist { font-family:'DM Mono',monospace; font-size:12px; color:var(--yellow); font-weight:500; }
    .empty-msg { text-align:center; padding:14px; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; color:rgba(255,255,255,0.5); border:1px dashed rgba(255,214,0,0.22); border-radius:8px; line-height:1.6; }
  </style>
</head>
<body>

<div id="permission-screen">
  <div class="logo-icon">🧭</div>
  <h1 class="perm-title">AR<br/><em>안전체험 가이드</em></h1>
  <p class="perm-sub">카메라를 통해 주변 체험 시설의<br/>위치를 실시간으로 안내합니다</p>
  <div class="perm-items">
    <div class="perm-item"><span class="perm-icon">📷</span><div class="perm-label">카메라<small>AR 오버레이 표시</small></div></div>
    <div class="perm-item"><span class="perm-icon">📍</span><div class="perm-label">위치 (GPS)<small>거리 및 방향 계산</small></div></div>
    <div class="perm-item"><span class="perm-icon">🧭</span><div class="perm-label">나침반<small>화살표 방향 표시</small></div></div>
  </div>
  <button id="start-btn" onclick="requestPermissions()">AR 시작하기 →</button>
  <p id="error-msg"></p>
</div>

<div id="ar-screen">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">GPS 신호 탐색 중...</span>
  </div>
  <div id="info-panel">
    <div id="count-label">탐지된 위치 : 0곳</div>
    <div id="gps-coords">위도 — / 경도 —</div>
    <div id="nearby-list"></div>
  </div>
</div>

<script>
const SEARCH_RADIUS = 600;
const LOCATIONS_URL = 'locations.json';
const FOV_H = 60; // 폰 카메라 수평 시야각(도)

let userLat = null, userLon = null, compassHeading = 0;
let locations = [], nearby = [];

// ── 원근 스케일: 거리 100m 줄 때마다 커짐 ─────────────────────
// 600m → scale 0.38, 500m → 0.48 ... 100m → 0.88, 0m → 1.0
function perspectiveScale(dist) {
  // 최대 거리 600m 기준, 선형 보간
  // 600m: 0.38 / 100m: 0.88 / 0m: 1.0
  const minScale = 0.38, maxScale = 1.0;
  const t = Math.max(0, 1 - dist / SEARCH_RADIUS);
  return minScale + (maxScale - minScale) * t;
}

// ── 거리 계산 ─────────────────────────────────────────────────
function calcDist(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── 방위각 계산 ───────────────────────────────────────────────
function calcBearing(lat1, lon1, lat2, lon2) {
  const dLon = (lon2-lon1)*Math.PI/180;
  const y = Math.sin(dLon)*Math.cos(lat2*Math.PI/180);
  const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)
           - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function angleDiff(a, b) { return ((a-b+540)%360)-180; }

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── 위치 데이터 로드 ─────────────────────────────────────────
async function loadLocations() {
  try {
    const res = await fetch(LOCATIONS_URL);
    locations = await res.json();
  } catch(e) {
    locations = [
      {name:"생존수영",           lat:37.1028735053073,   lon:129.04242483596474},
      {name:"주수체험",           lat:37.104298260520885, lon:129.0399941892712},
      {name:"심폐소생술·외상처치", lat:37.103922335806324, lon:129.04063647937465},
      {name:"소화기체험",         lat:37.102679842056396, lon:129.04006887222562},
      {name:"테스트",             lat:37.100263887244125, lon:129.02195210047313}
    ];
  }
}

// ── Canvas 렌더 ───────────────────────────────────────────────
function render() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width  = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  ctx.clearRect(0,0,W,H);

  if (userLat === null) { requestAnimationFrame(render); return; }

  const bounce = Math.sin(Date.now()/480) * 4; // 화살표 바운스
  const halfFOV = FOV_H / 2;
  const EDGE_PAD = 28; // 화면 가장자리 여백

  nearby.forEach(loc => {
    const dist    = Math.round(calcDist(userLat, userLon, loc.lat, loc.lon));
    const bearing = calcBearing(userLat, userLon, loc.lat, loc.lon);
    const diff    = angleDiff(bearing, compassHeading);
    const scale   = perspectiveScale(dist);

    // ── 기본 크기 (scale=1 기준) ──
    // 너무 크지 않게 — 최대 라벨 너비 약 150px
    const BASE_FONT   = 14;   // px
    const BASE_DIST_FONT = 11;
    const BASE_PAD_X  = 14;
    const BASE_PAD_Y  = 8;
    const BASE_ARROW  = 11;
    const BASE_RADIUS = 7;

    const font     = BASE_FONT   * scale;
    const distFont = BASE_DIST_FONT * scale;
    const padX     = BASE_PAD_X  * scale;
    const padY     = BASE_PAD_Y  * scale;
    const arrowSz  = BASE_ARROW  * scale;
    const radius   = BASE_RADIUS * scale;

    ctx.font = `bold ${font}px 'Noto Sans KR', sans-serif`;
    const labelW = ctx.measureText(loc.name).width;
    const boxW   = labelW + padX * 2;
    const lineH  = font + distFont + padY * 2 + 4 * scale;
    const boxH   = lineH;

    const isInFOV = Math.abs(diff) <= halfFOV + 5;

    // ── FOV 안: 실제 방향에 라벨 표시 ────────────────────────
    if (isInFOV) {
      // X 위치 — diff 0° = 화면 중앙
      const xRatio = (diff / halfFOV + 1) / 2;
      let x = W * xRatio;
      x = Math.max(boxW/2 + EDGE_PAD, Math.min(W - boxW/2 - EDGE_PAD, x));

      // Y 위치 — 거리 멀수록 위쪽, 가까울수록 아래쪽 (원근감)
      const yBase = H * 0.18 + (1 - scale) * H * 0.22;

      // FOV 경계 페이드
      const fade = Math.min(1, (halfFOV + 5 - Math.abs(diff)) / 12);
      ctx.save();
      ctx.globalAlpha = Math.max(0.4, fade);

      drawLabel(ctx, x, yBase, loc.name, dist, boxW, boxH, font, distFont, padY, arrowSz, radius, scale, bounce);
      ctx.restore();

    } else {
      // ── FOV 밖: 가장자리에 방향 표시 ─────────────────────────
      // 작은 삼각형 + 이름만 표시

      const edgeScale = scale * 0.65; // 가장자리는 더 작게
      const ef   = BASE_FONT   * edgeScale;
      const epX  = BASE_PAD_X  * edgeScale;
      const epY  = BASE_PAD_Y  * edgeScale;
      const earr = BASE_ARROW  * edgeScale;
      const erad = BASE_RADIUS * edgeScale;

      ctx.font = `bold ${ef}px 'Noto Sans KR', sans-serif`;
      const eLabelW = ctx.measureText(loc.name).width;
      const eBoxW = eLabelW + epX * 2;
      const eBoxH = ef + epY * 2;

      // 왼쪽/오른쪽 가장자리 결정
      const onLeft = diff < 0;
      const ex = onLeft ? EDGE_PAD + eBoxW/2 : W - EDGE_PAD - eBoxW/2;

      // Y: 거리에 따라 배치
      const ey = H * 0.15 + (1 - edgeScale) * H * 0.2;

      ctx.save();
      ctx.globalAlpha = 0.75;

      // 배경판
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      roundRect(ctx, ex - eBoxW/2, ey - eBoxH/2, eBoxW, eBoxH, erad);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,214,0,0.5)';
      ctx.lineWidth = 1;
      roundRect(ctx, ex - eBoxW/2, ey - eBoxH/2, eBoxW, eBoxH, erad);
      ctx.stroke();

      // 장소명
      ctx.fillStyle = '#FFFFFF';
      ctx.font = `bold ${ef}px 'Noto Sans KR', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(loc.name, ex, ey);

      // 방향 삼각형 (←/→)
      const triSz = earr * 0.9;
      const triY = ey;
      ctx.fillStyle = '#FFD600';
      ctx.beginPath();
      if (onLeft) {
        // 왼쪽 화살표
        ctx.moveTo(ex - eBoxW/2 - 5,          triY);
        ctx.lineTo(ex - eBoxW/2 - 5 - triSz,  triY - triSz*0.65);
        ctx.lineTo(ex - eBoxW/2 - 5 - triSz,  triY + triSz*0.65);
      } else {
        // 오른쪽 화살표
        ctx.moveTo(ex + eBoxW/2 + 5,          triY);
        ctx.lineTo(ex + eBoxW/2 + 5 + triSz,  triY - triSz*0.65);
        ctx.lineTo(ex + eBoxW/2 + 5 + triSz,  triY + triSz*0.65);
      }
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }
  });

  requestAnimationFrame(render);
}

// ── 라벨 + 화살표 그리기 ─────────────────────────────────────
function drawLabel(ctx, x, yBase, name, dist, boxW, boxH, font, distFont, padY, arrowSz, radius, scale, bounce) {
  const boxX = x - boxW / 2;
  const boxY = yBase;

  // 배경판
  ctx.fillStyle = 'rgba(0,0,0,0.70)';
  roundRect(ctx, boxX, boxY, boxW, boxH, radius);
  ctx.fill();

  // 테두리
  ctx.strokeStyle = 'rgba(255,214,0,0.65)';
  ctx.lineWidth = 1.2 * scale;
  roundRect(ctx, boxX, boxY, boxW, boxH, radius);
  ctx.stroke();

  // 장소명
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${font}px 'Noto Sans KR', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(name, x, boxY + padY + font / 2);

  // 거리
  ctx.fillStyle = '#FFD600';
  ctx.font = `bold ${distFont}px 'DM Mono', monospace`;
  ctx.fillText(`${dist}m`, x, boxY + boxH - padY - distFont / 2);

  // 화살표 ▼ (바운스)
  const arrowY = boxY + boxH + 6 * scale + bounce;
  ctx.fillStyle = '#FFD600';
  ctx.shadowColor = 'rgba(255,214,0,0.5)';
  ctx.shadowBlur   = 8 * scale;
  ctx.beginPath();
  ctx.moveTo(x - arrowSz, arrowY);
  ctx.lineTo(x + arrowSz, arrowY);
  ctx.lineTo(x, arrowY + arrowSz * 1.1);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // 점선
  ctx.strokeStyle = 'rgba(255,214,0,0.30)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4*scale, 4*scale]);
  ctx.beginPath();
  ctx.moveTo(x, arrowY + arrowSz * 1.1 + 3);
  ctx.lineTo(x, arrowY + arrowSz * 1.1 + 24 * scale);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ── HUD ──────────────────────────────────────────────────────
function updateHUD() {
  if (userLat === null) return;
  nearby = locations
    .filter(l => calcDist(userLat, userLon, l.lat, l.lon) <= SEARCH_RADIUS)
    .sort((a,b) => calcDist(userLat,userLon,a.lat,a.lon) - calcDist(userLat,userLon,b.lat,b.lon));

  document.getElementById('count-label').textContent =
    nearby.length > 0 ? `탐지된 위치 : ${nearby.length}곳` : '탐지된 위치 없음';
  document.getElementById('gps-coords').textContent =
    `위도 ${userLat.toFixed(6)}  /  경도 ${userLon.toFixed(6)}`;
  document.getElementById('status-text').textContent =
    nearby.length > 0 ? `${nearby.length}개 위치 표시 중 (600m 이내)` : '600m 이내 위치 없음';

  document.getElementById('nearby-list').innerHTML = nearby.length === 0
    ? `<div class="empty-msg">현재 위치 주변에<br/>등록된 정보가 없습니다.</div>`
    : nearby.map(l => {
        const d = Math.round(calcDist(userLat,userLon,l.lat,l.lon));
        return `<div class="nearby-item">
          <span class="nearby-name">${l.name}</span>
          <span class="nearby-dist">${d}m</span>
        </div>`;
      }).join('');
}

// ── GPS 감시 ─────────────────────────────────────────────────
function startGPSWatch() {
  navigator.geolocation.watchPosition(
    (pos) => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      updateHUD();
    },
    () => { document.getElementById('status-text').textContent = 'GPS 오류 — 실외에서 시도하세요'; },
    { enableHighAccuracy:true, timeout:10000, maximumAge:1000 }
  );
}

// ── 나침반 ────────────────────────────────────────────────────
function startCompass() {
  const handler = (e) => {
    if (e.webkitCompassHeading !== undefined) {
      compassHeading = e.webkitCompassHeading;
    } else if (e.alpha !== null) {
      compassHeading = (360 - e.alpha) % 360;
    }
  };
  window.addEventListener('deviceorientationabsolute', handler, true);
  window.addEventListener('deviceorientation', handler, true);
}

async function requestPermissions() {
  const btn = document.getElementById('start-btn');
  const errEl = document.getElementById('error-msg');
  btn.textContent = '권한 요청 중...';
  btn.disabled = true;
  errEl.style.display = 'none';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();

    await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(
        (pos) => { userLat=pos.coords.latitude; userLon=pos.coords.longitude; resolve(); },
        reject, { enableHighAccuracy:true, timeout:15000 }
      );
    });

    if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
      try { await DeviceOrientationEvent.requestPermission(); } catch(e) {}
    }

    await loadLocations();

    document.getElementById('permission-screen').style.display = 'none';
    document.getElementById('ar-screen').style.display = 'block';

    startCompass();
    startGPSWatch();
    render();
  } catch(e) {
    errEl.style.display = 'block';
    if (e.code === 1) errEl.textContent = '📍 위치 권한이 필요합니다.\n설정 > 사이트 권한에서 허용해주세요.';
    else if (e.name === 'NotAllowedError') errEl.textContent = '📷 카메라 권한이 필요합니다.\n설정 > 사이트 권한에서 허용해주세요.';
    else errEl.textContent = `오류: ${e.message || e}`;
    btn.textContent = '다시 시도';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
