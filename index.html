<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>AR 제5회 청소년 안전캠프 체험 가이드</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=DM+Mono:wght@500&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --yellow:#FFD600; --bg-dark:#060C10;
      --glass:rgba(6,12,16,0.82); --text:#FFFFFF;
      --text-dim:rgba(255,255,255,0.55); --border:rgba(255,214,0,0.30); --green:#00E676;
      --red:#FF5252; --orange:#FF9800;
    }
    html,body { width:100%; height:100%; overflow:hidden; background:#000; }

    /* ── 권한 화면 ── */
    #permission-screen {
      position:fixed; inset:0; z-index:9999;
      background: radial-gradient(ellipse at 50% 30%, #0d1f2e 0%, #060C10 70%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:32px 24px; font-family:'Noto Sans KR',sans-serif;
    }

    /* 상단 배지 */
    .camp-badge {
      font-family:'DM Mono',monospace; font-size:10px; color:var(--yellow);
      letter-spacing:2px; text-transform:uppercase; margin-bottom:16px;
      border:1px solid rgba(255,214,0,0.4); border-radius:100px;
      padding:4px 14px; background:rgba(255,214,0,0.07);
    }

    .logo-icon { font-size:48px; margin-bottom:14px; animation:float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

    .perm-title {
      font-size:22px; font-weight:900; color:var(--text);
      text-align:center; line-height:1.3; margin-bottom:6px;
    }
    .perm-title em { color:var(--yellow); font-style:normal; display:block; font-size:20px; }

    .perm-sub {
      font-size:13px; color:var(--text-dim);
      text-align:center; line-height:1.7; margin-bottom:20px;
    }

    /* ※ 권한 안내 헤더 */
    .perm-section-label {
      width:100%; max-width:300px;
      font-size:12px; font-weight:700; color:rgba(255,255,255,0.7);
      margin-bottom:8px; padding-left:2px;
      letter-spacing:0.3px;
    }
    .perm-section-label span { color:var(--yellow); }

    .perm-items { display:flex; flex-direction:column; gap:7px; width:100%; max-width:300px; margin-bottom:24px; }
    .perm-item {
      display:flex; align-items:center; gap:12px;
      background:rgba(255,214,0,0.05); border:1px solid var(--border);
      border-radius:10px; padding:11px 14px;
    }
    .perm-icon { font-size:18px; flex-shrink:0; }
    .perm-label { font-size:13px; font-weight:700; color:var(--text); }
    .perm-label small { display:block; font-size:11px; color:var(--text-dim); font-weight:400; margin-top:1px; }

    #start-btn {
      width:100%; max-width:300px; padding:15px;
      background:var(--yellow); color:#060C10; border:none; border-radius:12px; cursor:pointer;
      font-family:'Noto Sans KR',sans-serif; font-size:16px; font-weight:900;
      box-shadow:0 0 24px rgba(255,214,0,0.45); transition:all .2s;
    }
    #start-btn:active { transform:scale(0.97); }
    #start-btn:disabled { opacity:0.6; cursor:default; }
    #error-msg {
      margin-top:14px; font-family:'DM Mono',monospace; font-size:12px;
      color:#FF5252; text-align:center; display:none; line-height:1.7; white-space:pre-line;
    }

    /* ── AR 화면 ── */
    #ar-screen { position:fixed; inset:0; display:none; }
    #video  { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    #canvas { position:absolute; inset:0; width:100%; height:100%; }

    /* 코너 */
    .corner { position:absolute; width:22px; height:22px; z-index:10; }
    .corner::before,.corner::after { content:''; position:absolute; background:var(--yellow); }
    .corner::before { width:100%; height:2px; top:0; left:0; }
    .corner::after  { width:2px; height:100%; top:0; left:0; }
    .corner.tl { top:14px; left:14px; }
    .corner.tr { top:14px; right:14px; transform:rotate(90deg); }
    .corner.bl { bottom:14px; left:14px; transform:rotate(270deg); }
    .corner.br { bottom:14px; right:14px; transform:rotate(180deg); }

    /* 상태바 */
    #status-bar {
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      background:var(--glass); border:1px solid var(--border); border-radius:100px; padding:7px 16px;
      display:flex; align-items:center; gap:8px; backdrop-filter:blur(12px);
      font-family:'DM Mono',monospace; font-size:11px; color:var(--text); white-space:nowrap; z-index:10;
    }
    #status-dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--green); box-shadow:0 0 6px var(--green);
      animation:blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* GPS 정확도 경고 */
    #accuracy-warn {
      position:absolute; top:52px; left:50%; transform:translateX(-50%);
      background:rgba(255,80,50,0.88); border-radius:8px; padding:5px 14px;
      font-family:'DM Mono',monospace; font-size:11px; color:#fff;
      white-space:nowrap; z-index:10; display:none;
    }

    /* ── 근접 알림 배너 (100m 이내) ── */
    #close-banner {
      position:absolute; top:58px; left:12px; right:12px; z-index:20;
      background:rgba(255,214,0,0.15); border:1.5px solid rgba(255,214,0,0.7);
      border-radius:12px; padding:10px 16px;
      display:none; align-items:center; gap:10px;
      backdrop-filter:blur(10px);
      animation: bannerPulse 2s ease-in-out infinite;
    }
    @keyframes bannerPulse {
      0%,100% { box-shadow: 0 0 12px rgba(255,214,0,0.3); }
      50%      { box-shadow: 0 0 24px rgba(255,214,0,0.6); }
    }
    #close-banner .cb-icon { font-size:22px; flex-shrink:0; }
    #close-banner .cb-text { font-family:'Noto Sans KR',sans-serif; font-weight:700; font-size:13px; color:#fff; line-height:1.4; }
    #close-banner .cb-text span { color:var(--yellow); font-size:15px; display:block; }

    /* 하단 패널 */
    #info-panel {
      position:absolute; bottom:0; left:0; right:0; z-index:10;
      background:linear-gradient(transparent, var(--glass) 35%);
      padding:40px 18px 24px;
    }
    #count-label {
      font-family:'Noto Sans KR',sans-serif; font-weight:900;
      font-size:11px; color:var(--yellow); letter-spacing:1px; margin-bottom:4px;
    }
    #gps-coords { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); margin-bottom:8px; }
    #nearby-list { display:flex; flex-direction:column; gap:5px; max-height:150px; overflow-y:auto; }
    #nearby-list::-webkit-scrollbar { display:none; }
    .nearby-item {
      display:flex; justify-content:space-between; align-items:center;
      background:rgba(6,12,16,0.75); border:1px solid var(--border);
      border-radius:8px; padding:9px 13px; backdrop-filter:blur(8px);
    }
    .nearby-item.close-range { border-color:rgba(255,214,0,0.7); background:rgba(255,214,0,0.10); }
    .nearby-name {
      font-family:'Noto Sans KR',sans-serif; font-weight:700;
      font-size:13px; color:var(--text); display:flex; align-items:center; gap:7px;
    }
    .nearby-name::before { content:'▼'; color:var(--yellow); font-size:9px; }
    .nearby-dist { font-family:'DM Mono',monospace; font-size:12px; color:var(--yellow); font-weight:500; }
    .nearby-dist.close { color:#FFD600; font-size:13px; }
    .empty-msg {
      text-align:center; padding:14px;
      font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700;
      color:rgba(255,255,255,0.5); border:1px dashed rgba(255,214,0,0.22);
      border-radius:8px; line-height:1.6;
    }
  </style>
</head>
<body>

<!-- 권한 화면 -->
<div id="permission-screen">
  <div class="camp-badge">🏕 제5회 청소년 안전캠프</div>
  <div class="logo-icon">🧭</div>
  <h1 class="perm-title">
    AR<em>체험 가이드</em>
  </h1>
  <p class="perm-sub">카메라를 통해 주변 체험장의<br/>위치를 실시간으로 안내합니다</p>

  <p class="perm-section-label"><span>※</span> 다음의 권한이 필요합니다.</p>
  <div class="perm-items">
    <div class="perm-item">
      <span class="perm-icon">📷</span>
      <div class="perm-label">카메라<small>AR 오버레이 표시</small></div>
    </div>
    <div class="perm-item">
      <span class="perm-icon">📍</span>
      <div class="perm-label">위치 (GPS)<small>거리 및 방향 계산</small></div>
    </div>
    <div class="perm-item">
      <span class="perm-icon">🧭</span>
      <div class="perm-label">나침반<small>화살표 방향 표시</small></div>
    </div>
  </div>
  <button id="start-btn" onclick="requestPermissions()">AR 시작하기 →</button>
  <p id="error-msg"></p>
</div>

<!-- AR 화면 -->
<div id="ar-screen">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">GPS 신호 탐색 중...</span>
  </div>
  <div id="accuracy-warn">⚠ GPS 정확도 낮음 — 실외에서 사용하세요</div>
  <div id="close-banner">
    <div class="cb-icon">🎯</div>
    <div class="cb-text">
      <span id="close-banner-name">체험장</span>
      근처에 도착했습니다!
    </div>
  </div>
  <div id="info-panel">
    <div id="count-label">탐지된 위치 : 0곳</div>
    <div id="gps-coords">위도 — / 경도 —</div>
    <div id="nearby-list"></div>
  </div>
</div>

<script>
const SEARCH_RADIUS  = 600;  // 탐색 반경(m)
const CLOSE_RADIUS   = 100;  // 근접 대형 표시 반경(m)
const FOV_H          = 60;   // 카메라 수평 시야각(도)
const LOCATIONS_URL  = 'locations.json';

let userLat = null, userLon = null, gpsAccuracy = null;
let compassHeading = 0;
let locations = [], nearby = [];
let closestInRange = null; // 100m 이내 가장 가까운 위치

// ── 거리 계산 (Haversine) ─────────────────────────────────────
function calcDist(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── 방위각 계산 ───────────────────────────────────────────────
function calcBearing(lat1, lon1, lat2, lon2) {
  const dLon = (lon2-lon1)*Math.PI/180;
  const y = Math.sin(dLon)*Math.cos(lat2*Math.PI/180);
  const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)
           - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// ── 각도 차이 (-180 ~ 180) ────────────────────────────────────
function angleDiff(a, b) { return ((a-b+540)%360)-180; }

// ── 원근 스케일 (일반 마커용) ─────────────────────────────────
function perspectiveScale(dist) {
  const t = Math.max(0, 1 - dist / SEARCH_RADIUS);
  return 0.40 + 0.60 * t;
}

// ── 둥근 사각형 ───────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── 위치 데이터 로드 ──────────────────────────────────────────
async function loadLocations() {
  try {
    const res = await fetch(LOCATIONS_URL);
    const raw = await res.json();
    const seen = new Set();
    locations = raw.filter(l => {
      if (seen.has(l.name)) return false;
      seen.add(l.name); return true;
    });
  } catch(e) {
    locations = [
      {name:"생존수영",            lat:37.1028735053073,   lon:129.04242483596474},
      {name:"주수체험",            lat:37.104298260520885, lon:129.0399941892712},
      {name:"심폐소생술·외상처치",  lat:37.103922335806324, lon:129.04063647937465},
      {name:"소화기체험",          lat:37.102679842056396, lon:129.04006887222562},
      {name:"테스트",              lat:37.100263887244125, lon:129.02195210047313}
    ];
  }
}

// ── 대형 근접 AR 마커 그리기 (100m 이내) ─────────────────────
function drawCloseMarker(ctx, W, H, loc, dist, diff) {
  const halfFOV = FOV_H / 2;
  const t = Date.now();
  const bounce = Math.sin(t / 400) * 8;      // 더 큰 바운스
  const pulse  = 0.85 + Math.sin(t / 700) * 0.15; // 글로우 펄스

  // X 위치
  const xRatio = (diff / halfFOV + 1) / 2;
  let x = W * xRatio;
  x = Math.max(W * 0.15, Math.min(W * 0.85, x));

  // 큰 텍스트 설정
  const nameFontSize = Math.round(W * 0.075); // 화면 너비의 7.5%
  const distFontSize = Math.round(W * 0.045);
  const arrowSize    = Math.round(W * 0.055);

  ctx.save();

  // === 장소명 (대형, 노란색 + 그림자) ===
  ctx.font = `900 ${nameFontSize}px 'Noto Sans KR', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';

  // 외곽선 (검정)
  ctx.lineWidth = nameFontSize * 0.12;
  ctx.strokeStyle = 'rgba(0,0,0,0.95)';
  ctx.lineJoin = 'round';
  const textY = H * 0.20;
  ctx.strokeText(loc.name, x, textY);

  // 글로우
  ctx.shadowColor = 'rgba(255,214,0,0.9)';
  ctx.shadowBlur  = 18 * pulse;
  ctx.fillStyle   = '#FFD600';
  ctx.fillText(loc.name, x, textY);
  ctx.shadowBlur  = 0;

  // === 거리 텍스트 ===
  const distY = textY + distFontSize * 1.6;
  ctx.font = `bold ${distFontSize}px 'DM Mono', monospace`;

  ctx.lineWidth = distFontSize * 0.14;
  ctx.strokeStyle = 'rgba(0,0,0,0.95)';
  ctx.strokeText(`${dist}m`, x, distY);

  ctx.fillStyle = '#FFFFFF';
  ctx.shadowColor = 'rgba(255,255,255,0.6)';
  ctx.shadowBlur  = 8;
  ctx.fillText(`${dist}m`, x, distY);
  ctx.shadowBlur  = 0;

  // === 큰 화살표 ▼ ===
  const arrowTop = distY + distFontSize * 0.7 + bounce;
  ctx.shadowColor = 'rgba(255,214,0,0.8)';
  ctx.shadowBlur  = 16 * pulse;
  ctx.fillStyle   = '#FFD600';
  ctx.beginPath();
  ctx.moveTo(x - arrowSize,     arrowTop);
  ctx.lineTo(x + arrowSize,     arrowTop);
  ctx.lineTo(x,                 arrowTop + arrowSize * 1.3);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // 화살표 외곽선
  ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - arrowSize,     arrowTop);
  ctx.lineTo(x + arrowSize,     arrowTop);
  ctx.lineTo(x,                 arrowTop + arrowSize * 1.3);
  ctx.closePath();
  ctx.stroke();

  // === 점선 ===
  const lineStart = arrowTop + arrowSize * 1.3 + 6;
  ctx.strokeStyle = 'rgba(255,214,0,0.45)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 5]);
  ctx.beginPath();
  ctx.moveTo(x, lineStart);
  ctx.lineTo(x, lineStart + 30);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

// ── 일반 AR 마커 그리기 ───────────────────────────────────────
function drawNormalMarker(ctx, W, H, loc, dist, diff, scale, bounce) {
  const halfFOV = FOV_H / 2;
  const MARGIN  = 20;

  const B_FONT  = 15;
  const B_DFONT = 11;
  const B_PADX  = 14;
  const B_PADY  = 7;
  const B_GAP   = 4;
  const B_ARR   = 11;
  const B_RAD   = 8;

  const font   = B_FONT  * scale;
  const dfont  = B_DFONT * scale;
  const padX   = B_PADX  * scale;
  const padY   = B_PADY  * scale;
  const gap    = B_GAP   * scale;
  const arrSz  = B_ARR   * scale;
  const radius = B_RAD   * scale;

  ctx.font = `bold ${font}px 'Noto Sans KR', sans-serif`;
  const nameW = ctx.measureText(loc.name).width;
  ctx.font = `bold ${dfont}px 'DM Mono', monospace`;
  const distW = ctx.measureText(`${dist}m`).width;
  const boxW  = Math.max(nameW, distW) + padX * 2;
  const boxH  = padY + font + gap + dfont + padY;

  const xRatio = (diff / halfFOV + 1) / 2;
  let x = W * xRatio;
  x = Math.max(boxW/2 + MARGIN, Math.min(W - boxW/2 - MARGIN, x));

  const yTop = H * 0.14 + (1 - scale) * H * 0.20;

  const FADE_START = halfFOV - 5;
  const fade = Math.abs(diff) > FADE_START
    ? 1 - (Math.abs(diff) - FADE_START) / (halfFOV - FADE_START)
    : 1;

  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, fade));

  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  roundRect(ctx, x - boxW/2, yTop, boxW, boxH, radius);
  ctx.fill();

  ctx.strokeStyle = 'rgba(255,214,0,0.65)';
  ctx.lineWidth = 1.2 * scale;
  roundRect(ctx, x - boxW/2, yTop, boxW, boxH, radius);
  ctx.stroke();

  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${font}px 'Noto Sans KR', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(loc.name, x, yTop + padY);

  ctx.fillStyle = '#FFD600';
  ctx.font = `bold ${dfont}px 'DM Mono', monospace`;
  ctx.fillText(`${dist}m`, x, yTop + padY + font + gap);

  const arrTop = yTop + boxH + 5 * scale + bounce;
  ctx.fillStyle = '#FFD600';
  ctx.shadowColor = 'rgba(255,214,0,0.55)';
  ctx.shadowBlur  = 7 * scale;
  ctx.beginPath();
  ctx.moveTo(x - arrSz,     arrTop);
  ctx.lineTo(x + arrSz,     arrTop);
  ctx.lineTo(x,             arrTop + arrSz * 1.1);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = 'rgba(255,214,0,0.28)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4 * scale, 4 * scale]);
  ctx.beginPath();
  ctx.moveTo(x, arrTop + arrSz * 1.1 + 3);
  ctx.lineTo(x, arrTop + arrSz * 1.1 + 22 * scale);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

// ── Canvas 렌더 ───────────────────────────────────────────────
function render() {
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width  = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  ctx.clearRect(0, 0, W, H);

  if (userLat === null) { requestAnimationFrame(render); return; }

  const bounce  = Math.sin(Date.now()/500) * 4;
  const halfFOV = FOV_H / 2;

  nearby.forEach(loc => {
    const dist    = Math.round(calcDist(userLat, userLon, loc.lat, loc.lon));
    const bearing = calcBearing(userLat, userLon, loc.lat, loc.lon);
    const diff    = angleDiff(bearing, compassHeading);

    if (Math.abs(diff) > halfFOV) return;

    if (dist <= CLOSE_RADIUS) {
      // ── 100m 이내: 대형 근접 마커 ──
      drawCloseMarker(ctx, W, H, loc, dist, diff);
    } else {
      // ── 100m 초과: 일반 마커 ──
      const scale = perspectiveScale(dist);
      drawNormalMarker(ctx, W, H, loc, dist, diff, scale, bounce);
    }
  });

  requestAnimationFrame(render);
}

// ── 근접 배너 업데이트 ────────────────────────────────────────
function updateCloseBanner() {
  const banner = document.getElementById('close-banner');
  const nameEl = document.getElementById('close-banner-name');

  const closeOnes = nearby.filter(l =>
    calcDist(userLat, userLon, l.lat, l.lon) <= CLOSE_RADIUS
  );

  if (closeOnes.length > 0) {
    const nearest = closeOnes[0];
    nameEl.textContent = nearest.name;
    banner.style.display = 'flex';
  } else {
    banner.style.display = 'none';
  }
}

// ── HUD 업데이트 ─────────────────────────────────────────────
function updateHUD() {
  if (userLat === null) return;

  nearby = locations
    .filter(l => calcDist(userLat, userLon, l.lat, l.lon) <= SEARCH_RADIUS)
    .sort((a, b) =>
      calcDist(userLat,userLon,a.lat,a.lon) - calcDist(userLat,userLon,b.lat,b.lon));

  document.getElementById('count-label').textContent =
    nearby.length > 0 ? `탐지된 위치 : ${nearby.length}곳` : '탐지된 위치 없음';
  document.getElementById('gps-coords').textContent =
    `위도 ${userLat.toFixed(6)}  /  경도 ${userLon.toFixed(6)}`;
  document.getElementById('status-text').textContent =
    nearby.length > 0 ? `${nearby.length}개 위치 표시 중 (${SEARCH_RADIUS}m 이내)` : `${SEARCH_RADIUS}m 이내 위치 없음`;

  const warnEl = document.getElementById('accuracy-warn');
  warnEl.style.display = (gpsAccuracy !== null && gpsAccuracy > 50) ? 'block' : 'none';

  document.getElementById('nearby-list').innerHTML = nearby.length === 0
    ? `<div class="empty-msg">현재 위치 주변에<br/>등록된 정보가 없습니다.</div>`
    : nearby.map(l => {
        const d = Math.round(calcDist(userLat,userLon,l.lat,l.lon));
        const isClose = d <= CLOSE_RADIUS;
        return `<div class="nearby-item${isClose ? ' close-range' : ''}">
          <span class="nearby-name">${isClose ? '🎯 ' : ''}${l.name}</span>
          <span class="nearby-dist${isClose ? ' close' : ''}">${d}m${isClose ? ' 📍' : ''}</span>
        </div>`;
      }).join('');

  updateCloseBanner();
}

// ── GPS 감시 ─────────────────────────────────────────────────
function startGPSWatch() {
  navigator.geolocation.watchPosition(
    pos => {
      userLat      = pos.coords.latitude;
      userLon      = pos.coords.longitude;
      gpsAccuracy  = pos.coords.accuracy;
      updateHUD();
    },
    () => { document.getElementById('status-text').textContent = 'GPS 오류 — 실외에서 시도하세요'; },
    { enableHighAccuracy:true, timeout:10000, maximumAge:1000 }
  );
}

// ── 나침반 ────────────────────────────────────────────────────
function startCompass() {
  const handler = e => {
    if (e.webkitCompassHeading != null) {
      compassHeading = e.webkitCompassHeading;
    } else if (e.absolute && e.alpha != null) {
      compassHeading = (360 - e.alpha) % 360;
    } else if (e.alpha != null) {
      compassHeading = (360 - e.alpha) % 360;
    }
  };
  window.addEventListener('deviceorientationabsolute', handler, true);
  window.addEventListener('deviceorientation', handler, true);
}

// ── 권한 요청 → AR 시작 ──────────────────────────────────────
async function requestPermissions() {
  const btn   = document.getElementById('start-btn');
  const errEl = document.getElementById('error-msg');
  btn.textContent = '권한 요청 중...';
  btn.disabled = true;
  errEl.style.display = 'none';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();

    await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(
        pos => {
          userLat     = pos.coords.latitude;
          userLon     = pos.coords.longitude;
          gpsAccuracy = pos.coords.accuracy;
          resolve();
        },
        reject,
        { enableHighAccuracy:true, timeout:15000 }
      );
    });

    if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
      try { await DeviceOrientationEvent.requestPermission(); } catch(e) {}
    }

    await loadLocations();

    document.getElementById('permission-screen').style.display = 'none';
    document.getElementById('ar-screen').style.display = 'block';
    startCompass();
    startGPSWatch();
    render();

  } catch(e) {
    errEl.style.display = 'block';
    if (e.code === 1)
      errEl.textContent = '📍 위치 권한이 필요합니다.\n설정 > 사이트 권한에서 허용해주세요.';
    else if (e.name === 'NotAllowedError')
      errEl.textContent = '📷 카메라 권한이 필요합니다.\n설정 > 사이트 권한에서 허용해주세요.';
    else
      errEl.textContent = `오류: ${e.message || e}`;
    btn.textContent = '다시 시도';
    btn.disabled = false;
  }
}
</script>
