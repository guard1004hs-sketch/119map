<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>AR 제5회 청소년 안전캠프 체험 가이드</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=DM+Mono:wght@500&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --yellow:#FFD600; --bg-dark:#060C10;
      --glass:rgba(6,12,16,0.82); --text:#FFFFFF;
      --text-dim:rgba(255,255,255,0.55); --border:rgba(255,214,0,0.30); --green:#00E676;
    }
    html,body { width:100%; height:100%; overflow:hidden; background:#000; }

    /* ── 권한/메인 화면 ── */
    #permission-screen {
      position:fixed; inset:0; z-index:9999;
      background: radial-gradient(ellipse at 50% 30%, #0d1f2e 0%, #060C10 70%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:28px 24px; font-family:'Noto Sans KR',sans-serif; gap:0;
    }
    .camp-badge {
      font-family:'DM Mono',monospace; font-size:10px; color:var(--yellow);
      letter-spacing:2px; margin-bottom:14px;
      border:1px solid rgba(255,214,0,0.4); border-radius:100px;
      padding:4px 14px; background:rgba(255,214,0,0.07);
    }
    .logo-icon { font-size:44px; margin-bottom:12px; animation:float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .perm-title { font-size:20px; font-weight:900; color:var(--text); text-align:center; line-height:1.3; margin-bottom:4px; }
    .perm-title em { color:var(--yellow); font-style:normal; display:block; font-size:18px; }
    .perm-sub { font-size:12px; color:var(--text-dim); text-align:center; line-height:1.7; margin-bottom:18px; }
    .perm-section-label {
      width:100%; max-width:300px; font-size:12px; font-weight:700;
      color:rgba(255,255,255,0.7); margin-bottom:7px; padding-left:2px;
    }
    .perm-section-label span { color:var(--yellow); }
    .perm-items { display:flex; flex-direction:column; gap:6px; width:100%; max-width:300px; margin-bottom:20px; }
    .perm-item {
      display:flex; align-items:center; gap:12px;
      background:rgba(255,214,0,0.05); border:1px solid var(--border);
      border-radius:10px; padding:10px 14px;
    }
    .perm-icon { font-size:18px; flex-shrink:0; }
    .perm-label { font-size:13px; font-weight:700; color:var(--text); }
    .perm-label small { display:block; font-size:11px; color:var(--text-dim); font-weight:400; margin-top:1px; }
    #start-btn {
      width:100%; max-width:300px; padding:14px;
      background:var(--yellow); color:#060C10; border:none; border-radius:12px; cursor:pointer;
      font-family:'Noto Sans KR',sans-serif; font-size:16px; font-weight:900;
      box-shadow:0 0 24px rgba(255,214,0,0.45); transition:all .2s;
    }
    #start-btn:active { transform:scale(0.97); }
    #start-btn:disabled { opacity:0.6; cursor:default; }
    #error-msg {
      margin-top:12px; font-family:'DM Mono',monospace; font-size:12px;
      color:#FF5252; text-align:center; display:none; line-height:1.7; white-space:pre-line;
    }

    /* ── AR 화면 ── */
    #ar-screen { position:fixed; inset:0; display:none; }
    #video  { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    #canvas { position:absolute; inset:0; width:100%; height:100%; }

    /* 코너 */
    .corner { position:absolute; width:22px; height:22px; z-index:10; }
    .corner::before,.corner::after { content:''; position:absolute; background:var(--yellow); }
    .corner::before { width:100%; height:2px; top:0; left:0; }
    .corner::after  { width:2px; height:100%; top:0; left:0; }
    .corner.tl { top:14px; left:14px; }
    .corner.tr { top:14px; right:14px; transform:rotate(90deg); }
    .corner.bl { bottom:14px; left:14px; transform:rotate(270deg); }
    .corner.br { bottom:14px; right:14px; transform:rotate(180deg); }

    /* 상태바 */
    #status-bar {
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      background:var(--glass); border:1px solid var(--border); border-radius:100px; padding:7px 16px;
      display:flex; align-items:center; gap:8px; backdrop-filter:blur(12px);
      font-family:'DM Mono',monospace; font-size:11px; color:var(--text); white-space:nowrap; z-index:10;
    }
    #status-dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--green); box-shadow:0 0 6px var(--green);
      animation:blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* GPS 정확도 경고 */
    #accuracy-warn {
      position:absolute; top:52px; left:50%; transform:translateX(-50%);
      background:rgba(255,80,50,0.88); border-radius:8px; padding:5px 14px;
      font-family:'DM Mono',monospace; font-size:11px; color:#fff;
      white-space:nowrap; z-index:10; display:none;
    }

    /* ── 목적지 선택 패널 ── */
    #dest-panel {
      position:absolute; bottom:0; left:0; right:0; z-index:20;
      background:linear-gradient(transparent, rgba(6,12,16,0.97) 30%);
      padding:36px 14px 20px;
    }
    #dest-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:10px; padding:0 2px;
    }
    #dest-title {
      font-family:'Noto Sans KR',sans-serif; font-weight:900;
      font-size:12px; color:var(--yellow); letter-spacing:0.5px;
    }
    #nav-status {
      font-family:'DM Mono',monospace; font-size:10px;
      color:var(--text-dim);
    }
    #dest-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:7px;
    }
    .dest-btn {
      display:flex; flex-direction:column; align-items:center; gap:5px;
      background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.12);
      border-radius:12px; padding:10px 6px 8px; cursor:pointer;
      font-family:'Noto Sans KR',sans-serif; transition:all .2s;
      -webkit-tap-highlight-color:transparent;
    }
    .dest-btn img { width:44px; height:44px; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }
    .dest-btn span { font-size:11px; font-weight:700; color:var(--text-dim); text-align:center; line-height:1.2; }
    .dest-btn.active {
      border-color:var(--yellow); background:rgba(255,214,0,0.12);
      box-shadow:0 0 14px rgba(255,214,0,0.3);
    }
    .dest-btn.active span { color:var(--yellow); }
    .dest-btn:active { transform:scale(0.94); }

    /* ── 네비게이션 화살표 HUD ── */
    #nav-hud {
      position:absolute; top:58px; left:50%; transform:translateX(-50%);
      z-index:15; display:none; flex-direction:column; align-items:center; gap:4px;
    }
    #nav-compass {
      width:64px; height:64px; position:relative;
    }
    #nav-arrow-svg {
      width:64px; height:64px; transition:transform 0.15s ease;
    }
    #nav-info {
      background:var(--glass); border:1px solid rgba(255,214,0,0.5);
      border-radius:10px; padding:5px 14px;
      text-align:center; backdrop-filter:blur(10px);
    }
    #nav-dest-name {
      font-family:'Noto Sans KR',sans-serif; font-weight:900;
      font-size:13px; color:var(--yellow); display:block;
    }
    #nav-dest-dist {
      font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim);
    }
    #cancel-nav {
      font-family:'Noto Sans KR',sans-serif; font-size:10px;
      color:rgba(255,255,255,0.4); background:none; border:none;
      cursor:pointer; padding:2px 8px; text-decoration:underline;
    }

    /* GPS 정보 */
    #gps-coords {
      font-family:'DM Mono',monospace; font-size:9px;
      color:rgba(255,255,255,0.25); text-align:center;
      position:absolute; bottom:calc(100% + 2px); left:0; right:0;
    }
  </style>
</head>
<body>

<!-- 권한 화면 -->
<div id="permission-screen">
  <div class="camp-badge">🏕 제5회 청소년 안전캠프</div>
  <div class="logo-icon">🧭</div>
  <h1 class="perm-title">AR<em>체험 가이드</em></h1>
  <p class="perm-sub">카메라를 통해 주변 체험장의<br/>위치를 실시간으로 안내합니다</p>
  <p class="perm-section-label"><span>※</span> 다음의 권한이 필요합니다.</p>
  <div class="perm-items">
    <div class="perm-item"><span class="perm-icon">📷</span><div class="perm-label">카메라<small>AR 오버레이 표시</small></div></div>
    <div class="perm-item"><span class="perm-icon">📍</span><div class="perm-label">위치 (GPS)<small>거리 및 방향 계산</small></div></div>
    <div class="perm-item"><span class="perm-icon">🧭</span><div class="perm-label">나침반<small>화살표 방향 표시</small></div></div>
  </div>
  <button id="start-btn" onclick="requestPermissions()">AR 시작하기 →</button>
  <p id="error-msg"></p>
</div>

<!-- AR 화면 -->
<div id="ar-screen">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <!-- 상태바 -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">GPS 신호 탐색 중...</span>
  </div>
  <div id="accuracy-warn">⚠ GPS 정확도 낮음 — 실외에서 사용하세요</div>

  <!-- 네비게이션 HUD (목적지 선택 시 표시) -->
  <div id="nav-hud">
    <div id="nav-info">
      <span id="nav-dest-name">목적지</span>
      <span id="nav-dest-dist">— m</span>
    </div>
    <svg id="nav-arrow-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" fill="rgba(0,0,0,0.55)" stroke="rgba(255,214,0,0.6)" stroke-width="1.5"/>
      <polygon points="32,8 22,42 32,36 42,42" fill="#FFD600" filter="url(#glow)"/>
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
    </svg>
    <button id="cancel-nav" onclick="cancelNav()">✕ 안내 종료</button>
  </div>

  <!-- 목적지 선택 패널 -->
  <div id="dest-panel">
    <div id="gps-coords">위도 — / 경도 —</div>
    <div id="dest-header">
      <span id="dest-title">📍 체험장 선택 — 탭하면 길안내 시작</span>
      <span id="nav-status"></span>
    </div>
    <div id="dest-grid"></div>
  </div>
</div>

const SEARCH_RADIUS = 600;
const CLOSE_RADIUS  = 100;
const FOV_H         = 60;
const LOCATIONS_URL = 'locations.json';

let userLat = null, userLon = null, gpsAccuracy = null;
let compassHeading = 0;
let locations = [], nearby = [];
let navTarget = null;        // 선택된 목적지
let imgCache  = {};        // 로드된 Image 객체

// ── 이미지 프리로드 ──────────────────────────────────────────
function preloadImages() {
  Object.entries(LOCATION_IMAGES).forEach(([k, src]) => {
    const img = new Image();
    img.src = src;
    imgCache[k] = img;
  });
}

// ── 위치에 맞는 이미지 가져오기 ─────────────────────────────
function getLocImage(name) {
  if (imgCache[name]) return imgCache[name];
  // 부분 매칭 (심폐소생술 · 외상처치 등)
  for (const k of Object.keys(imgCache)) {
    if (name.includes(k) || k.includes(name)) return imgCache[k];
  }
  return null;
}

// ── 거리 계산 ─────────────────────────────────────────────────
function calcDist(lat1,lon1,lat2,lon2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcBearing(lat1,lon1,lat2,lon2) {
  const dLon=(lon2-lon1)*Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(lat2*Math.PI/180);
  const x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function angleDiff(a,b) { return ((a-b+540)%360)-180; }
function perspectiveScale(dist) {
  const t=Math.max(0,1-dist/SEARCH_RADIUS);
  return 0.40+0.60*t;
}
function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── 위치 데이터 로드 ─────────────────────────────────────────
async function loadLocations() {
  try {
    const res=await fetch(LOCATIONS_URL);
    const raw=await res.json();
    const seen=new Set();
    locations=raw.filter(l=>{ if(seen.has(l.name)) return false; seen.add(l.name); return true; });
  } catch(e) {
    locations=[
      {name:"생존수영",            lat:37.1028735053073,   lon:129.04242483596474},
      {name:"주수체험",            lat:37.104298260520885, lon:129.0399941892712},
      {name:"심폐소생술 · 외상처치", lat:37.103922335806324, lon:129.04063647937465},
      {name:"소화기체험",          lat:37.102679842056396, lon:129.04006887222562},
    ];
  }
}

// ── 목적지 선택 UI 렌더 ──────────────────────────────────────
function renderDestGrid() {
  const grid = document.getElementById('dest-grid');
  grid.innerHTML = locations.map((loc,i) => {
    const dist = userLat!==null ? Math.round(calcDist(userLat,userLon,loc.lat,loc.lon)) : '—';
    const imgKey = Object.keys(LOCATION_IMAGES).find(k => loc.name.includes(k) || k.includes(loc.name)) || '';
    const imgSrc = LOCATION_IMAGES[imgKey] || '';
    const isActive = navTarget && navTarget.name === loc.name;
    const distLabel = typeof dist==='number' ? (dist<=CLOSE_RADIUS ? `🎯 ${dist}m` : `${dist}m`) : '—';
    return `<div class="dest-btn ${isActive?'active':''}" onclick="setNavTarget(${i})">
      ${imgSrc ? `<img src="${imgSrc}" alt="${loc.name}"/>` : '<div style="width:44px;height:44px;font-size:28px;display:flex;align-items:center;justify-content:center;">📍</div>'}
      <span>${loc.name}<br/><span style="font-size:10px;font-weight:400;opacity:0.7">${distLabel}</span></span>
    </div>`;
  }).join('');
}

// ── 목적지 설정 / 취소 ───────────────────────────────────────
function setNavTarget(idx) {
  navTarget = locations[idx];
  document.getElementById('nav-hud').style.display='flex';
  document.getElementById('nav-dest-name').textContent=navTarget.name;
  renderDestGrid();
  updateNavHUD();
}
function cancelNav() {
  navTarget=null;
  document.getElementById('nav-hud').style.display='none';
  renderDestGrid();
}

// ── 네비게이션 HUD 업데이트 ─────────────────────────────────
function updateNavHUD() {
  if (!navTarget||userLat===null) return;
  const dist=Math.round(calcDist(userLat,userLon,navTarget.lat,navTarget.lon));
  const bearing=calcBearing(userLat,userLon,navTarget.lat,navTarget.lon);
  const relAngle=bearing-compassHeading;  // 화살표 회전각

  document.getElementById('nav-dest-dist').textContent=
    dist<=CLOSE_RADIUS ? `🎯 도착! ${dist}m` : `${dist}m 앞`;

  // SVG 화살표 회전
  document.getElementById('nav-arrow-svg').style.transform=`rotate(${relAngle}deg)`;
}

// ── Canvas 렌더 ───────────────────────────────────────────────
function render() {
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.offsetWidth;
  const H=canvas.height=canvas.offsetHeight;
  ctx.clearRect(0,0,W,H);

  if (userLat===null) { requestAnimationFrame(render); return; }

  const bounce=Math.sin(Date.now()/500)*4;
  const halfFOV=FOV_H/2;

  // 네비게이션 모드: 목적지 방향 화살표 (FOV 밖이어도 표시)
  if (navTarget) {
    const dist=Math.round(calcDist(userLat,userLon,navTarget.lat,navTarget.lon));
    const bearing=calcBearing(userLat,userLon,navTarget.lat,navTarget.lon);
    const diff=angleDiff(bearing,compassHeading);

    if (Math.abs(diff)<=halfFOV) {
      // FOV 안: 화면에 마커 표시
      if (dist<=CLOSE_RADIUS) {
        drawCloseMarker(ctx,W,H,navTarget,dist,diff,halfFOV,true);
      } else {
        const scale=perspectiveScale(dist);
        drawNormalMarker(ctx,W,H,navTarget,dist,diff,scale,bounce,halfFOV,true);
      }
    }
    // FOV 밖이면 SVG HUD 화살표로만 안내 (이미 updateNavHUD에서 처리)
    updateNavHUD();
  } else {
    // 네비게이션 미선택: 주변 전체 표시
    nearby.forEach(loc => {
      const dist=Math.round(calcDist(userLat,userLon,loc.lat,loc.lon));
      const bearing=calcBearing(userLat,userLon,loc.lat,loc.lon);
      const diff=angleDiff(bearing,compassHeading);
      if (Math.abs(diff)>halfFOV) return;
      if (dist<=CLOSE_RADIUS) {
        drawCloseMarker(ctx,W,H,loc,dist,diff,halfFOV,false);
      } else {
        const scale=perspectiveScale(dist);
        drawNormalMarker(ctx,W,H,loc,dist,diff,scale,bounce,halfFOV,false);
      }
    });
  }

  requestAnimationFrame(render);
}

// ── 대형 근접 마커 (100m 이내) ───────────────────────────────
function drawCloseMarker(ctx,W,H,loc,dist,diff,halfFOV,isNav) {
  const t=Date.now();
  const bounce=Math.sin(t/400)*10;
  const pulse=0.85+Math.sin(t/700)*0.15;

  const xRatio=(diff/halfFOV+1)/2;
  let x=W*xRatio;
  x=Math.max(W*0.15,Math.min(W*0.85,x));

  const imgSize=Math.round(W*0.22);
  const nameFontSize=Math.round(W*0.065);
  const distFontSize=Math.round(W*0.038);
  const arrowSize=Math.round(W*0.048);

  ctx.save();

  // 이미지 그리기
  const img=getLocImage(loc.name);
  const imgY=H*0.06;
  if (img && img.complete && img.naturalWidth>0) {
    ctx.shadowColor='rgba(255,214,0,0.5)';
    ctx.shadowBlur=20*pulse;
    ctx.drawImage(img, x-imgSize/2, imgY, imgSize, imgSize);
    ctx.shadowBlur=0;
  }

  // 장소명
  ctx.font=`900 ${nameFontSize}px 'Noto Sans KR', sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  const textY=imgY+imgSize+nameFontSize*1.1;

  ctx.lineWidth=nameFontSize*0.12; ctx.strokeStyle='rgba(0,0,0,0.95)'; ctx.lineJoin='round';
  ctx.strokeText(loc.name,x,textY);
  ctx.shadowColor='rgba(255,214,0,0.9)'; ctx.shadowBlur=18*pulse;
  ctx.fillStyle='#FFD600'; ctx.fillText(loc.name,x,textY);
  ctx.shadowBlur=0;

  // 거리
  const distY=textY+distFontSize*1.8;
  ctx.font=`bold ${distFontSize}px 'DM Mono', monospace`;
  ctx.lineWidth=distFontSize*0.14; ctx.strokeStyle='rgba(0,0,0,0.95)';
  ctx.strokeText(`${dist}m`,x,distY);
  ctx.fillStyle='#FFFFFF'; ctx.shadowColor='rgba(255,255,255,0.5)'; ctx.shadowBlur=6;
  ctx.fillText(`${dist}m`,x,distY); ctx.shadowBlur=0;

  // 화살표
  const arrTop=distY+distFontSize*0.8+bounce;
  ctx.shadowColor='rgba(255,214,0,0.8)'; ctx.shadowBlur=16*pulse;
  ctx.fillStyle='#FFD600';
  ctx.beginPath();
  ctx.moveTo(x-arrowSize,arrTop); ctx.lineTo(x+arrowSize,arrTop);
  ctx.lineTo(x,arrTop+arrowSize*1.4); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(x-arrowSize,arrTop); ctx.lineTo(x+arrowSize,arrTop);
  ctx.lineTo(x,arrTop+arrowSize*1.4); ctx.closePath(); ctx.stroke();

  // 점선
  ctx.strokeStyle='rgba(255,214,0,0.4)'; ctx.lineWidth=1.5; ctx.setLineDash([6,5]);
  ctx.beginPath(); ctx.moveTo(x,arrTop+arrowSize*1.4+6); ctx.lineTo(x,arrTop+arrowSize*1.4+32); ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

// ── 일반 마커 ────────────────────────────────────────────────
function drawNormalMarker(ctx,W,H,loc,dist,diff,scale,bounce,halfFOV,isNav) {
  const MARGIN=20;
  const imgSz=44*scale;
  const font=16*scale, dfont=11*scale, padX=12*scale, padY=8*scale;
  const gap=3*scale, arrSz=10*scale, radius=9*scale;

  ctx.font=`bold ${font}px 'Noto Sans KR', sans-serif`;
  const nameW=ctx.measureText(loc.name).width;
  ctx.font=`bold ${dfont}px 'DM Mono', monospace`;
  const distW=ctx.measureText(`${dist}m`).width;
  const boxW=Math.max(nameW, distW, imgSz)+padX*2;
  const boxH=padY+imgSz+gap+font+gap+dfont+padY;

  const xRatio=(diff/halfFOV+1)/2;
  let x=W*xRatio;
  x=Math.max(boxW/2+MARGIN,Math.min(W-boxW/2-MARGIN,x));

  const yTop=H*0.10+(1-scale)*H*0.18;

  const FADE_START=halfFOV-5;
  const fade=Math.abs(diff)>FADE_START?1-(Math.abs(diff)-FADE_START)/(halfFOV-FADE_START):1;

  ctx.save();
  ctx.globalAlpha=Math.max(0,Math.min(1,fade));

  // 배경판
  const borderColor=isNav?'rgba(255,214,0,0.9)':`rgba(255,214,0,${0.5+scale*0.3})`;
  ctx.fillStyle='rgba(0,0,0,0.75)';
  roundRect(ctx,x-boxW/2,yTop,boxW,boxH,radius); ctx.fill();
  ctx.strokeStyle=borderColor; ctx.lineWidth=(isNav?2:1.2)*scale;
  roundRect(ctx,x-boxW/2,yTop,boxW,boxH,radius); ctx.stroke();

  // 이미지
  const img=getLocImage(loc.name);
  const imgTop=yTop+padY;
  if (img && img.complete && img.naturalWidth>0) {
    ctx.drawImage(img,x-imgSz/2,imgTop,imgSz,imgSz);
  }

  // 장소명
  ctx.fillStyle=isNav?'#FFD600':'#FFFFFF';
  ctx.font=`bold ${font}px 'Noto Sans KR', sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(loc.name,x,imgTop+imgSz+gap);

  // 거리
  ctx.fillStyle='#FFD600';
  ctx.font=`bold ${dfont}px 'DM Mono', monospace`;
  ctx.fillText(`${dist}m`,x,imgTop+imgSz+gap+font+gap);

  // 화살표
  const arrTop=yTop+boxH+4*scale+bounce;
  ctx.fillStyle=isNav?'#FFD600':'rgba(255,214,0,0.85)';
  ctx.shadowColor='rgba(255,214,0,0.6)'; ctx.shadowBlur=(isNav?12:7)*scale;
  ctx.beginPath();
  ctx.moveTo(x-arrSz,arrTop); ctx.lineTo(x+arrSz,arrTop);
  ctx.lineTo(x,arrTop+arrSz*1.2); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;

  // 점선
  ctx.strokeStyle='rgba(255,214,0,0.3)'; ctx.lineWidth=1;
  ctx.setLineDash([4*scale,4*scale]);
  ctx.beginPath(); ctx.moveTo(x,arrTop+arrSz*1.2+3); ctx.lineTo(x,arrTop+arrSz*1.2+20*scale); ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

// ── HUD 업데이트 ─────────────────────────────────────────────
function updateHUD() {
  if (userLat===null) return;
  nearby=locations
    .filter(l=>calcDist(userLat,userLon,l.lat,l.lon)<=SEARCH_RADIUS)
    .sort((a,b)=>calcDist(userLat,userLon,a.lat,a.lon)-calcDist(userLat,userLon,b.lat,b.lon));

  document.getElementById('status-text').textContent=
    nearby.length>0?`${nearby.length}개 위치 감지 중`:`${SEARCH_RADIUS}m 이내 위치 없음`;
  document.getElementById('gps-coords').textContent=
    `위도 ${userLat.toFixed(6)} / 경도 ${userLon.toFixed(6)}`;

  const warnEl=document.getElementById('accuracy-warn');
  warnEl.style.display=(gpsAccuracy!==null&&gpsAccuracy>50)?'block':'none';

  renderDestGrid();
  if (navTarget) updateNavHUD();
}

// ── GPS ───────────────────────────────────────────────────────
function startGPSWatch() {
  navigator.geolocation.watchPosition(
    pos=>{ userLat=pos.coords.latitude; userLon=pos.coords.longitude; gpsAccuracy=pos.coords.accuracy; updateHUD(); },
    ()=>{ document.getElementById('status-text').textContent='GPS 오류 — 실외에서 시도'; },
    { enableHighAccuracy:true, timeout:10000, maximumAge:1000 }
  );
}

// ── 나침반 ────────────────────────────────────────────────────
function startCompass() {
  const handler=e=>{
    if (e.webkitCompassHeading!=null) compassHeading=e.webkitCompassHeading;
    else if (e.alpha!=null) compassHeading=(360-e.alpha)%360;
  };
  window.addEventListener('deviceorientationabsolute',handler,true);
  window.addEventListener('deviceorientation',handler,true);
}

// ── 권한 요청 → AR 시작 ──────────────────────────────────────
async function requestPermissions() {
  const btn=document.getElementById('start-btn');
  const errEl=document.getElementById('error-msg');
  btn.textContent='권한 요청 중...'; btn.disabled=true; errEl.style.display='none';
  try {
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    const video=document.getElementById('video');
    video.srcObject=stream; await video.play();

    await new Promise((resolve,reject)=>{
      navigator.geolocation.getCurrentPosition(
        pos=>{ userLat=pos.coords.latitude; userLon=pos.coords.longitude; gpsAccuracy=pos.coords.accuracy; resolve(); },
        reject, {enableHighAccuracy:true,timeout:15000}
      );
    });

    if (typeof DeviceOrientationEvent?.requestPermission==='function') {
      try { await DeviceOrientationEvent.requestPermission(); } catch(e) {}
    }

    await loadLocations();
    preloadImages();

    document.getElementById('permission-screen').style.display='none';
    document.getElementById('ar-screen').style.display='block';
    startCompass(); startGPSWatch();
    renderDestGrid();
    render();

  } catch(e) {
    errEl.style.display='block';
    if (e.code===1) errEl.textContent='📍 위치 권한이 필요합니다.\n설정 > 사이트 권한에서 허용해주세요.';
    else if (e.name==='NotAllowedError') errEl.textContent='📷 카메라 권한이 필요합니다.\n설정 > 사이트 권한에서 허용해주세요.';
    else errEl.textContent=`오류: ${e.message||e}`;
    btn.textContent='다시 시도'; btn.disabled=false;
  }
}
